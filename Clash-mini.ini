; 1. 规则组
ruleset=🌍 国外,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Global/Global.list
ruleset=➡️ 国内,https://cdn.statically.io/gh/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=➡️ 国内,https://cdn.statically.io/gh/ACL4SSR/ACL4SSR/master/Clash/ChinaIp.list
ruleset=➡️ 国内,[]GEOIP,CN
ruleset=🌍 国外,[]FINAL

; 2. 策略组（只留两个逻辑）
custom_proxy_group=🌍 国外`select`[]国外节点`[]DIRECT`[]REJECT
custom_proxy_group=➡️ 国内`select`[]DIRECT`[]国外节点`[]REJECT

; 3. 节点组（自动分国内 / 国外）
custom_proxy_group=国外节点`url-test`(?!.*(国内|China|CN|电信|联通|移动)).*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=国内节点`url-test`(国内|China|CN|电信|联通|移动)`http://www.gstatic.com/generate_204`300,,50

; 4. 启用规则
enable_rule_generator=true
overwrite_original_rules=true
