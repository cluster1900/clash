; 1. 规则组
ruleset=🎥 流媒体,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Streaming/Streaming.list
ruleset=🌍 国外,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Global/Global.list
ruleset=➡️ 国内,https://cdn.statically.io/gh/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=➡️ 国内,https://cdn.statically.io/gh/ACL4SSR/ACL4SSR/master/Clash/ChinaIp.list
ruleset=➡️ 国内,[]GEOIP,CN
ruleset=🌍 国外,[]FINAL

; 2. 策略组
custom_proxy_group=🎥 流媒体`select`[]所有-自动`[]美国-自动`[]香港-自动`[]日本-自动`[]新加坡-自动`[]REJECT
custom_proxy_group=🌍 国外`select`[]所有-自动`[]美国-自动`[]香港-自动`[]日本-自动`[]新加坡-自动`[]DIRECT`[]REJECT
custom_proxy_group=➡️ 国内`select`[]DIRECT`[]REJECT

; 3. 节点组
custom_proxy_group=所有-自动`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=美国-自动`url-test`(美|US|United States|美国|洛杉矶|圣何塞|硅谷|纽约|达拉斯|西雅图|波特兰|凤凰城|费利蒙|拉斯)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=香港-自动`url-test`(港|HK|Hong Kong|香港)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=日本-自动`url-test`(日|JP|Japan|日本|东京|大阪)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=新加坡-自动`url-test`(新加坡|SG|Singapore|狮城|坡)`http://www.gstatic.com/generate_204`300,,50

; 4. 启用规则集
enable_rule_generator=true
overwrite_original_rules=true
